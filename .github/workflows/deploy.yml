name: Deploy

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Lint, test, build, e2e
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      # Build sanity check (keyless). The e2e step rebuilds against the mock
      # backend itself, since the statically prerendered /blog list must be
      # built with API_URL pointed at the mock.
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ""

      - name: E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # GitOps deploy (mirrors the backend repo): build the image with prod build-args
  # baked in → push to ECR (keyless OIDC) → bump the image tag in the infra repo.
  # CI never touches the cluster — ArgoCD reconciles the tag commit.
  #
  # NOTE: frontend config is BUILD-TIME. API_URL + the Turnstile site key are baked
  # into the image here; they cannot be changed at runtime via the Helm values.
  deploy:
    name: Build, push ECR, bump infra tag
    needs: test
    # Only deploy on a push to main; PRs run `test` only.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # assume the AWS deploy role via OIDC
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          IMAGE: ${{ steps.ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:${{ github.sha }}
          # In-cluster backend Service — server-side rewrites resolve this, the
          # public host (api.tsyvinda.com) is NOT reachable from inside the pod.
          API_URL: ${{ vars.FRONTEND_API_URL }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
        run: |
          docker build \
            --build-arg "API_URL=${API_URL}" \
            --build-arg "NEXT_PUBLIC_TURNSTILE_SITE_KEY=${NEXT_PUBLIC_TURNSTILE_SITE_KEY}" \
            -t "$IMAGE" .
          docker push "$IMAGE"

      # Bump the prod image tag in the infra repo → ArgoCD picks it up.
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.INFRA_REPOSITORY }}
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra

      - name: Bump frontend image tag
        working-directory: infra
        run: |
          yq -i '.image.tag = "${{ github.sha }}"' helm/frontend/values-prod.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "deploy(frontend): ${{ github.sha }}"
          git push
