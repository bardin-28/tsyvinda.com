name: Deploy

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Lint, test, build, e2e
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      # Build sanity check (keyless). The e2e step rebuilds against the mock
      # backend itself, since the statically prerendered /blog list must be
      # built with API_URL pointed at the mock.
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ""

      - name: E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy:
    name: Deploy
    needs: test
    # Only deploy on a push to main; PRs run `test` only.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          # Abort (and fail the job) on the first failing command, so a broken
          # build does not fall through to `up -d` and redeploy a stale image.
          script_stop: true
          script: |
            set -e
            cd app
            git pull

            # Docker — build first; only deploy if the build succeeds.
            docker compose build --no-cache
            docker compose up -d --remove-orphans
